<style>
:root{
  --bg:#f6f7f9;--card:#fff;--text:#1f2937;--muted:#6b7280;--line:#e5e7eb;
  --orange:#ff7a21;--soft:#fff2e8;--green:#16a34a;--amber:#f59e0b;--red:#ef4444;
  --purple:#6d28d9;--shadow:0 10px 30px rgba(15,23,42,.08)
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:linear-gradient(#f6f7f9,#eceef2);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;color:var(--text)}
.app{max-width:430px;min-height:100vh;margin:0 auto;background:var(--bg)}
.top{position:sticky;top:0;z-index:10;background:rgba(246,247,249,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:18px 18px 10px}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:40px;height:40px;border-radius:14px;border:0;background:linear-gradient(135deg,#ff944d,#ff6a00);color:#fff;font-weight:900;display:grid;place-items:center;box-shadow:var(--shadow);cursor:pointer}
.brand h1{font-size:20px;margin:0;line-height:1.1}.brand h1 span{color:var(--orange)}
.sub{font-size:13px;color:var(--muted);line-height:1.45}.tiny{font-size:12px;color:var(--muted)}
.badge{display:inline-flex;align-items:center;gap:6px;background:var(--soft);color:var(--orange);border:1px solid #ffd9bf;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;white-space:nowrap}
.badge.live{background:#ecfdf5;border-color:#a7f3d0;color:#047857}.badge.demo{background:#fef3c7;border-color:#fde68a;color:#92400e}
.content{padding:16px 16px 100px}
.card{background:#fff;border-radius:22px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.title{font-size:18px;font-weight:900;margin:0 0 10px}
.btn{border:0;border-radius:16px;padding:14px 16px;font-size:15px;font-weight:900;cursor:pointer;transition:.15s ease}
.btn:active{transform:scale(.98)}.btn.primary{background:linear-gradient(135deg,#ff8b3d,#ff6a00);color:#fff;box-shadow:0 10px 20px rgba(255,106,0,.22)}
.btn.light{background:#fff;border:1px solid var(--line);color:var(--text)}.btn.soft{background:var(--soft);color:var(--orange);border:1px solid #ffd9bf}
.btn.green{background:#ecfdf5;color:#047857;border:1px solid #a7f3d0}.btn.danger{background:#fff1f2;color:#e11d48;border:1px solid #fecdd3}
.btn.small{padding:10px 12px;font-size:13px;border-radius:12px}.btn.full{width:100%}.btnrow{display:flex;gap:10px;margin-top:14px}
.hero{display:flex;gap:14px;align-items:flex-start}.platewrap{width:102px;flex:0 0 102px;height:102px;border-radius:26px;background:linear-gradient(#fff8e8,#f7eed1);border:1px solid #f0e2b7;display:grid;place-items:center}
.meal-name{font-size:18px;font-weight:900;margin:8px 0 6px}.menu-list{padding-left:18px;margin:0;font-size:14px;color:#374151;line-height:1.5}
.bar{height:11px;border-radius:999px;background:#eceff3;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#ff9b55,#ff6a00)}
.line{height:1px;background:var(--line);margin:14px 0}.detail{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9;font-size:14px}.detail:last-child{border-bottom:0}.detail b{text-align:right}
.mini-card{padding:14px;border-radius:18px;background:#fff;border:1px solid var(--line)}
.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;z-index:25;width:min(430px,100%);display:grid;grid-template-columns:repeat(4,1fr);background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
.nav button{border:0;background:transparent;border-radius:16px;padding:8px 4px;color:#6b7280;font-weight:800;cursor:pointer}.nav button.active{background:var(--soft);color:var(--orange)}.nav b{display:block;font-size:20px}
.datebar{display:flex;gap:8px;margin:12px 0}.datebar .center{flex:1;background:#fff;border:1px solid var(--line);border-radius:16px;padding:11px;text-align:center;font-weight:900;cursor:pointer}
.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}.quick button{border:1px solid var(--line);background:#fff;border-radius:14px;padding:10px;font-weight:900;cursor:pointer}.quick button.active{border-color:#ffd9bf;background:var(--soft);color:var(--orange)}
.slots{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.slot{border:1px solid var(--line);background:#fff;border-radius:18px;padding:14px 12px;text-align:left;cursor:pointer}.slot.active{border-color:#ffcfab;background:var(--soft)}.slot.disabled{opacity:.45;pointer-events:none}
.time{font-size:18px;font-weight:900}.meta{font-size:12px;color:var(--muted)}.status{font-size:12px;font-weight:900;margin-top:8px}.good{color:var(--green)}.mid{color:var(--amber)}.bad{color:var(--red)}.gray{color:#6b7280}
#qrBox{display:flex;justify-content:center;align-items:center;margin:16px auto;padding:14px;width:172px;min-height:172px;background:#fff;border-radius:22px;border:1px solid #ffe1c9}.code{padding:14px;border-radius:18px;background:#fff;border:1px dashed #f7b787;font-weight:900;font-size:14px;text-align:center;word-break:break-all}
.pill{padding:4px 8px;border-radius:999px;font-size:11px;font-weight:900;white-space:nowrap}.reserve{background:#fff7ed;color:#ea580c}.checkin{background:#ecfdf5;color:#047857}.cancel{background:#fef2f2;color:#dc2626}
.notice-card{background:linear-gradient(#fff,#faf8ff);border:1px solid #ebe5ff}.notice-item{padding:12px 0;border-bottom:1px solid #f0edf9}.notice-item:last-child{border-bottom:0;padding-bottom:0}.notice-tag{display:inline-flex;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:900;background:#f3f0ff;color:var(--purple);margin-bottom:6px}.notice-text{font-size:14px;color:#374151;line-height:1.45}
.notice{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:16px;padding:12px;font-size:13px;margin-top:14px;line-height:1.5}
.overlay{position:fixed;inset:0;background:rgba(17,24,39,.44);display:none;align-items:flex-end;justify-content:center;z-index:80;padding:18px}.overlay.show{display:flex}.sheet{width:min(430px,100%);background:#fff;border-radius:28px 28px 18px 18px;box-shadow:0 25px 60px rgba(0,0,0,.25);max-height:92vh;overflow:auto}.sheethead{padding:16px 18px;border-bottom:1px solid var(--line)}.sheetbody{padding:18px}.form{display:flex;flex-direction:column;gap:12px}.input,.select,.file,textarea{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px;font-size:15px;background:#fff;outline:none;font-family:inherit}textarea{min-height:120px;resize:vertical}
.toast{position:fixed;left:50%;transform:translateX(-50%) translateY(30px);bottom:96px;z-index:60;background:#111827;color:#fff;padding:12px 16px;border-radius:14px;font-size:13px;font-weight:900;opacity:0;transition:.25s;max-width:calc(100% - 40px)}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.admin-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}.admin-tabs button{border:1px solid var(--line);background:#fff;padding:10px 8px;border-radius:14px;font-size:12px;font-weight:900;cursor:pointer}.admin-tabs button.active{background:var(--soft);border-color:#ffd9bf;color:var(--orange)}
.cameraBox{overflow:hidden;border-radius:18px;border:1px solid var(--line);background:#000;aspect-ratio:3/4;display:grid;place-items:center}.cameraBox video{width:100%;height:100%;object-fit:cover}.scanResult{margin-top:10px;padding:12px;border-radius:14px;background:#f8fafc;border:1px solid #e2e8f0;font-size:13px;line-height:1.45}.reservation-item{border:1px solid var(--line);border-radius:18px;padding:12px;background:#fff;margin-bottom:10px}

.dashboard-card{
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at 92% 4%, rgba(255,122,33,.18), transparent 28%),
    linear-gradient(180deg,#ffffff 0%,#fffaf5 100%);
  border:1px solid #ffe2ca;
}
.dashboard-card::after{
  content:"";
  position:absolute;
  right:-34px;
  top:-34px;
  width:118px;
  height:118px;
  border-radius:999px;
  background:rgba(255,122,33,.08);
}
.menu-kicker{display:flex;align-items:center;gap:8px;color:#ea580c;font-size:13px;font-weight:900;margin-bottom:8px}
.menu-kicker-dot{width:8px;height:8px;border-radius:999px;background:#ff7a21;box-shadow:0 0 0 6px rgba(255,122,33,.12)}
.menu-main-title{font-size:22px;font-weight:950;letter-spacing:-.4px;margin:0 0 6px}
.menu-summary{font-size:13px;color:#6b7280;line-height:1.45;margin-bottom:14px}
.menu-chip-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.menu-chip{display:inline-flex;align-items:center;padding:8px 10px;border-radius:999px;background:#fff;border:1px solid #ffe1c9;color:#374151;font-size:13px;font-weight:800}
.reserve-status-card{background:#fff;border:1px solid #f1f5f9;border-radius:18px;padding:13px;margin-top:14px}
.notice-card{background:linear-gradient(180deg,#fff,#fbfaff);border:1px solid #ede7ff}


.calendar-pop{
  margin-top:10px;
  padding:12px;
  border-radius:18px;
  border:1px solid #e5e7eb;
  background:#fff;
}
.calendar-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:10px;
}
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}
.calendar-weekday{
  text-align:center;
  font-size:11px;
  color:#6b7280;
  font-weight:900;
  padding:4px 0;
}
.calendar-day{
  border:1px solid #f1f5f9;
  background:#fff;

  padding:8px 0;
  font-size:13px;
  font-weight:900;
  cursor:pointer;
}
.calendar-day.muted{
  color:#cbd5e1;
  background:#f8fafc;
}
.calendar-day.active{

}
.noshow-warning{

  border-radius:16px;
  background:#fff1f2;
  border:1px solid #fecdd3;
  color:#9f1239;
  font-size:13px;
  line-height:1.5;
  font-weight:800;
}
.noshow-row{
  background:#fff7ed;

}


.reserve-focus-card{
  position:relative;
  overflow:hidden;
  background:linear-gradient(180deg,#fff7ed 0%,#ffffff 100%);
  border:1.5px solid #fed7aa;
  box-shadow:0 16px 34px rgba(255,122,33,.14);
}
.reserve-focus-card::before{
  content:"";
  position:absolute;
  top:-46px;
  right:-46px;
  width:132px;
  height:132px;
  border-radius:999px;
  background:rgba(255,122,33,.13);
}
.reserve-focus-head{
  position:relative;
  display:flex;

.reserve-focus-title{
  font-size:21px;
  font-weight:950;
  letter-spacing:-.4px;
  margin:0 0 5px;
}
.reserve-focus-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:44px;
  height:44px;
  border-radius:16px;
  color:#fff;
  font-size:20px;
  background:linear-gradient(135deg,#ff8b3d,#ff6a00);
  box-shadow:0 10px 20px rgba(255,106,0,.24);
}
.reserve-info-grid{
  position:relative;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:14px;
}
.reserve-info-cell{
  padding:10px 8px;
  border-radius:14px;
  border:1px solid #ffedd5;
  background:rgba(255,255,255,.72);
  text-align:center;
}
.reserve-info-cell b{display:block;font-size:13px;margin-top:3px;color:#111827}
.reserve-info-cell span{font-size:11px;color:#9a3412;font-weight:900}
.reserve-guide-text{
  position:relative;
  font-size:13px;
  color:#9a3412;
  font-weight:800;
  margin-bottom:12px;
  line-height:1.45;
}
.menu-check-card{
  background:#ffffff;
  border:1px solid #e5e7eb;
}
.menu-check-title{
  font-size:18px;
  font-weight:950;
  margin:0 0 4px;
}

</style>
</head>

<body>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCVqWRnBMtQFUU51xzukqVEnFts-VqEnhA",
  authDomain: "seogu-bapsang.firebaseapp.com",
  projectId: "seogu-bapsang",
  storageBucket: "seogu-bapsang.firebasestorage.app",
  messagingSenderId: "335336990084",
  appId: "1:335336990084:web:899e3f4d3532ac4e2329d1",
  measurementId: "G-6GKFMWGS0R"
};

const SLOTS=[["11:30",75],["11:45",70],["12:00",65],["12:15",50],["12:30",40]];
const SAMPLE=["제육볶음, 시금치무침, 김치, 된장국, 잡곡밥","돈까스, 양배추샐러드, 김치, 미소국, 흰쌀밥","닭갈비, 콩나물무침, 깍두기, 맑은국, 잡곡밥","카레라이스, 미니우동, 단무지, 샐러드","불고기볶음, 오이무침, 김치, 북어국, 잡곡밥"];

let db=null;
let firebaseOn=false;
let unsubReservations=null;
let unsubMenus=null;
let unsubNotices=null;
let unsubPenalties=null;

let st={
  tab:"home",
  date:fmt(new Date()),
  slot:"11:30",
  user:getLocal("user",null),
  reservations:getLocal("reservations",[]),
  menus:getLocal("menus",{}),
  notices:getLocal("notices",[]),
  penalties:getLocal("penalties",{}),
  menuPreviewDate:fmt(new Date()),
  menuCalendarOpen:false,
  showHistory:false,
  adminUnlocked:false,
  adminTab:"camera",
  scanStream:null,
  scanTimer:null
};

const views={
  home(){const m=menu(st.date),total=byDate(st.date).length,max=SLOTS.reduce((a,b)=>a+b[1],0),p=Math.round(total/max*100);return `
    <div class="card"><div class="row"><div><div style="font-weight:900">${st.user?esc(st.user.name):"직원"}님, 즐거운 점심시간 되세요!</div><div class="sub">${pretty(st.date)}</div></div><span class="badge">${myOnDate(st.date)?"예약 있음":"예약 가능"}</span></div></div>
    <div class="card dashboard-card">
      <div class="menu-kicker"><span class="menu-kicker-dot"></span><span>오늘의 점심</span></div>
      <h2 class="menu-main-title">${pretty(st.date)}</h2>
      <div class="menu-summary">오늘 준비된 메뉴를 확인하고 원하는 입장 시각을 예약해주세요.</div>
      <div class="menu-chip-wrap">${menuItems(m.menu).map(v=>`<span class="menu-chip">${esc(v)}</span>`).join("")}</div>
      ${m.note?`<div class="tiny" style="margin-top:10px">${esc(m.note)}</div>`:""}
      <div class="reserve-status-card">
        <div class="row" style="margin-bottom:8px"><strong>예약 현황</strong><span class="tiny">${total} / ${max}명 · ${p}%</span></div>
        <div class="bar"><div class="fill" style="width:${Math.min(p,100)}%"></div></div>
      </div>
      <div class="btnrow"><button class="btn primary full" onclick="go('reserve')">입장 시각 예약하기</button></div>
    </div>
    <div class="card notice-card"><div class="row" style="align-items:flex-start"><div><div class="title" style="font-size:16px;margin-bottom:4px">구내식당 이용안내 · 공지사항</div><div class="tiny">관리자 화면에서 공지와 버전업 내용을 등록할 수 있습니다.</div></div><span class="badge" style="background:#f3f0ff;border-color:#e7ddff;color:#6d28d9">업데이트</span></div><div class="line"></div>${homeNoticeList()}</div>`},
  reserve(){
    const bookingDate=todayDate();
    const previewDate=st.menuPreviewDate||bookingDate;

document.addEventListener("DOMContentLoaded", init);

async function init(){
  try{
    firebase.initializeApp(firebaseConfig);
    db=firebase.firestore();
    firebaseOn=true;
    setModeBadge();
    listenMenus();
    listenNotices();
    listenPenalties();
    listenReservations();
  }catch(e){
    console.error("Firebase init failed:", e);
    firebaseOn=false;
    setModeBadge();
    seedLocalIfNeeded();
  }
  render();
  updateLoginState();
}

function setModeBadge(){const b=document.getElementById("modeBadge");if(!b)return;b.textContent=firebaseOn?"실시간":"데모";b.className="badge "+(firebaseOn?"live":"demo")}
function getLocal(k,f){try{return JSON.parse(localStorage.getItem("sg_real_"+k))??f}catch{return f}}
function saveLocal(){localStorage.setItem("sg_real_user",JSON.stringify(st.user));localStorage.setItem("sg_real_reservations",JSON.stringify(st.reservations));localStorage.setItem("sg_real_menus",JSON.stringify(st.menus));localStorage.setItem("sg_real_notices",JSON.stringify(st.notices));localStorage.setItem("sg_real_penalties",JSON.stringify(st.penalties))}
function fmt(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function pretty(date){const d=new Date(date+"T00:00:00");return d.getFullYear()+"."+String(d.getMonth()+1).padStart(2,"0")+"."+String(d.getDate()).padStart(2,"0")+" ("+"일월화수목금토"[d.getDay()]+")"}
function esc(str){return String(str||"").replace(/[&<>\"]/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[s]))}
function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");clearTimeout(window.__toastT);window.__toastT=setTimeout(()=>el.classList.remove("show"),1800)}
function updateLoginState(){document.getElementById("login").classList.toggle("show",!st.user)}
function saveLogin(){const name=document.getElementById("name").value.trim(),dept=document.getElementById("dept").value,emp=document.getElementById("emp").value.trim();if(!name)return toast("이름을 입력해주세요.");if(!dept)return toast("부서를 선택해주세요.");if(!/^\d{4}$/.test(emp))return toast("행정번호 끝 4자리를 입력해주세요.");st.user={name,dept,emp};saveLocal();updateLoginState();render();toast("직원 정보가 저장되었습니다.")}
function go(tab){st.tab=tab;if(tab==="reserve"){st.date=todayDate();st.menuPreviewDate=todayDate();st.menuCalendarOpen=false;}if(tab!=="more"){st.adminUnlocked=false;stopScanner()}render()}
function shift(days){const d=new Date(st.date+"T00:00:00");d.setDate(d.getDate()+days);st.date=fmt(d);if(firebaseOn)listenReservations();render()}
function quick(n){const d=new Date();d.setDate(d.getDate()+n);st.date=fmt(d);if(firebaseOn)listenReservations();render()}
function activeQuick(n){const d=new Date();d.setDate(d.getDate()+n);return st.date===fmt(d)?"active":""}
function menu(date){if(st.menus[date])return st.menus[date];const n=new Date(date+"T00:00:00").getDate();return{date,main:"",menu:SAMPLE[n%SAMPLE.length],note:""}}
function byDate(date){return st.reservations.filter(r=>r.date===date&&r.status!=="cancelled")}
function counts(date){const c={};SLOTS.forEach(s=>c[s[0]]=0);byDate(date).forEach(r=>{if(c[r.time]!==undefined)c[r.time]++});return c}
function remain(date,time){const cap=SLOTS.find(s=>s[0]===time)[1];return Math.max(0,cap-(counts(date)[time]||0))}
function status(rem,cap){if(rem<=0)return["마감","gray"];const p=rem/cap;if(p>.45)return["여유","good"];if(p>.18)return["보통","mid"];return["혼잡","bad"]}
function myOnDate(date){return st.user?st.reservations.find(r=>r.emp===st.user.emp&&r.date===date&&r.status!=="cancelled"):null}
function latest(){if(!st.user)return null;return st.reservations.filter(r=>r.emp===st.user.emp&&r.status!=="cancelled").sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time))[0]||null}
function code(date,time,emp){return"SGMEAL|"+date+"|"+time+"|"+emp}
function docId(date,emp){return date+"_"+emp}
function slotId(date,time){return date+"_"+time.replace(":","")}

function todayDate(){return fmt(new Date());}
function nextDate(date){
  const d=new Date(date+"T00:00:00");
  d.setDate(d.getDate()+1);
  return fmt(d);
}
function isBlocked(emp,date=todayDate()){
  const p=st.penalties && st.penalties[emp];
  return !!(p && p.blockDate===date);
}
function blockMessage(emp,date=todayDate()){
  const p=st.penalties && st.penalties[emp];
  if(!p) return "";
  return `전일 노쇼 이력으로 ${pretty(p.blockDate)} 예약이 제한됩니다.`;
}

function selectSlot(time){st.slot=time;render()}
function render(){document.getElementById("content").innerHTML=views[st.tab]();document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));document.getElementById("nav-"+st.tab).classList.add("active");updateLoginState();setModeBadge();setTimeout(drawQr,0)}
function drawQr(){
  const box=document.getElementById("qrBox"),r=latest();
  if(!box||!r)return;
  box.innerHTML="";
  if(isLateReservationStatus(r.status)||r.qrEligible===false||!r.code){
    box.innerHTML='<div class="sub" style="text-align:center;font-weight:900;color:#9f1239">마감 후 예약<br>QR 입장 불가</div>';
    return;
  }
  if(typeof QRCode==="undefined")return;
  new QRCode(box,{text:r.code,width:140,height:140,correctLevel:QRCode.CorrectLevel.H});

function listenReservations(){

    st.reservations=snap.docs.map(d=>({id:d.id,...d.data()}));

  },err=>{console.error(err);toast("예약 데이터를 불러오지 못했습니다.");});

function isLateReservationStatus(status){
  return status==="late" || status==="late_reserved";
}
function lateReservationNotice(){
  return "오전 10시 30분 이후 예약은 기록만 남고 입장 QR은 생성되지 않습니다.";
}

function reservationDeadlinePassed(){
  const now=new Date();
  const deadline=new Date();
  deadline.setHours(10,30,0,0);
  return now>deadline;
}
function reservationDeadlineText(){
  return "예약 마감 시간(오전 10:30)이 지나 오늘 예약할 수 없습니다.";
}

async function reserve(){
  if(!st.user){updateLoginState();return toast("먼저 직원 정보를 등록해주세요.")}
  const bookingDate=todayDate();
  if(isBlocked(st.user.emp,bookingDate)) return toast(blockMessage(st.user.emp,bookingDate));
  st.date=bookingDate;
  if(firebaseOn) return reserveFirebase();
  if(myOnDate(bookingDate)){go("my");return toast("이미 오늘 예약이 있습니다.")}
  if(remain(bookingDate,st.slot)<=0)return toast("선택한 시간은 마감되었습니다.")
  const m=menu(bookingDate);
  const late=reservationDeadlinePassed();
  st.reservations.push({id:docId(bookingDate,st.user.emp),name:st.user.name,dept:st.user.dept,emp:st.user.emp,date:bookingDate,time:st.slot,meal:"점심식사",place:"본관 구내식당",loc:"서구청 본관 지하 1층",main:m.main,menu:m.menu,status:late?"late":"reserved",qrEligible:!late,code:late?"":code(bookingDate,st.slot,st.user.emp),createdAt:Date.now()});
  saveLocal();go("my");toast(late?lateReservationNotice():"예약이 완료되었습니다.")
}
async function reserveFirebase(){
  const bookingDate=todayDate();
  const rRef=db.collection("reservations").doc(docId(bookingDate,st.user.emp));
  const sRef=db.collection("slotCounts").doc(slotId(bookingDate,st.slot));
  const m=menu(bookingDate);
  const late=reservationDeadlinePassed();
  try{
    await db.runTransaction(async tx=>{
      const rSnap=await tx.get(rRef);
      if(rSnap.exists&&rSnap.data().status!=="cancelled") throw new Error("EXISTS");
      const pSnap=await tx.get(db.collection("penalties").doc(st.user.emp));
      if(pSnap.exists&&pSnap.data().blockDate===bookingDate) throw new Error("BLOCKED");
      const cap=SLOTS.find(s=>s[0]===st.slot)[1];
      if(!late){
        const sSnap=await tx.get(sRef);
        const count=sSnap.exists?(sSnap.data().count||0):0;
        if(count>=cap) throw new Error("FULL");
        tx.set(sRef,{date:bookingDate,time:st.slot,cap,count:count+1,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
      }
      tx.set(rRef,{name:st.user.name,dept:st.user.dept,emp:st.user.emp,date:bookingDate,time:st.slot,meal:"점심식사",place:"본관 구내식당",loc:"서구청 본관 지하 1층",main:m.main,menu:m.menu,status:late?"late":"reserved",qrEligible:!late,code:late?"":code(bookingDate,st.slot,st.user.emp),createdAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    });
    go("my");toast(late?lateReservationNotice():"예약이 완료되었습니다.");
  }catch(e){console.error(e);if(String(e.message).includes("EXISTS"))toast("이미 오늘 예약이 있습니다.");else if(String(e.message).includes("BLOCKED"))toast("노쇼 이력으로 오늘 예약이 제한됩니다.");else if(String(e.message).includes("FULL"))toast("선택한 시간은 마감되었습니다.");else toast("예약 처리 중 오류가 발생했습니다.")}
}
async function cancelRes(idv){
  if(firebaseOn)return cancelFirebase(idv);
  const r=st.reservations.find(x=>x.id===idv);if(!r)return;if(r.status==="checkedin")return toast("이미 입장 처리된 예약입니다.");r.status="cancelled";saveLocal();render();toast("예약이 취소되었습니다.")
}
async function cancelFirebase(idv){
  const rRef=db.collection("reservations").doc(idv);
  try{
    await db.runTransaction(async tx=>{
      const rSnap=await tx.get(rRef);if(!rSnap.exists)throw new Error("NO");
      const r=rSnap.data();if(r.status==="checkedin")throw new Error("CHECKED");
      const sRef=db.collection("slotCounts").doc(slotId(r.date,r.time));
      tx.update(rRef,{status:"cancelled",updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
      if(!isLateReservationStatus(r.status)){
        const sSnap=await tx.get(sRef);const count=sSnap.exists?(sSnap.data().count||0):0;
        tx.set(sRef,{count:Math.max(0,count-1),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
      }
    });
    toast("예약이 취소되었습니다.");
  }catch(e){console.error(e);toast(String(e.message).includes("CHECKED")?"이미 입장 처리된 예약입니다.":"예약 취소 중 오류가 발생했습니다.")}
}

async function markNoShow(idv){
  if(firebaseOn)return markNoShowFirebase(idv);
  const r=st.reservations.find(x=>x.id===idv);
  if(!r)return;
  if(r.status==="checkedin")return toast("이미 입장 처리된 예약입니다.");
  r.status="noshow";
  st.penalties[r.emp]={emp:r.emp,name:r.name,dept:r.dept,blockDate:nextDate(r.date),sourceDate:r.date,createdAtMs:Date.now()};
  saveLocal();render();toast(`${r.name}님 노쇼 처리: 다음날 예약이 제한됩니다.`);
}
async function markNoShowFirebase(idv){
  try{
    const rRef=db.collection("reservations").doc(idv);
    await db.runTransaction(async tx=>{
      const snap=await tx.get(rRef);
      if(!snap.exists)throw new Error("NO");
      const r=snap.data();
      if(r.status==="checkedin")throw new Error("CHECKED");
      const sRef=db.collection("slotCounts").doc(slotId(r.date,r.time));
      tx.update(rRef,{status:"noshow",updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
      if(!isLateReservationStatus(r.status)){
        const sSnap=await tx.get(sRef);
        const count=sSnap.exists?(sSnap.data().count||0):0;
        tx.set(sRef,{count:Math.max(0,count-1),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
      }
      tx.set(db.collection("penalties").doc(r.emp),{emp:r.emp,name:r.name,dept:r.dept,blockDate:nextDate(r.date),sourceDate:r.date,createdAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    });
    toast("노쇼 처리되었습니다. 다음날 예약이 제한됩니다.");
  }catch(e){console.error(e);toast(String(e.message).includes("CHECKED")?"이미 입장 처리된 예약입니다.":"노쇼 처리 중 오류가 발생했습니다.")}
}

async function checkin(idv){
  if(firebaseOn){try{await db.collection("reservations").doc(idv).update({status:"checkedin",updatedAt:firebase.firestore.FieldValue.serverTimestamp()});toast("입장 처리 완료")}catch(e){console.error(e);toast("입장 처리 중 오류가 발생했습니다.")}return;}
  const r=st.reservations.find(x=>x.id===idv);if(!r)return;if(r.status==="checkedin")return toast("이미 입장 처리되었습니다.");r.status="checkedin";saveLocal();render();toast("입장 처리 완료")
}
async function checkinByCode(text){
  if(!text)return "QR 정보가 없습니다.";
  const parts=String(text).split("|");
  if(firebaseOn&&parts.length>=4){
    const idv=docId(parts[1],parts[3]);
    const ref=db.collection("reservations").doc(idv);
    const snap=await ref.get();
    if(!snap.exists)return"예약 정보를 찾지 못했습니다.";
    const r=snap.data();
    if(r.status==="noshow")return `${r.name}님은 노쇼 처리된 예약입니다. 다음날 예약 제한 대상입니다.`;
    if(r.status==="checkedin")return `${r.name}님은 이미 입장 처리되었습니다.`;
    if(st.penalties[r.emp]&&st.penalties[r.emp].blockDate===r.date)return `${r.name}님은 노쇼 제한 대상입니다. 관리자 확인이 필요합니다.`;
    await ref.update({status:"checkedin",updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    return `${r.name}님 입장 처리 완료: ${r.time}`;
  }
  const found=st.reservations.find(r=>r.code===text)||(parts.length>=4?st.reservations.find(r=>r.date===parts[1]&&r.time===parts[2]&&r.emp===parts[3]&&r.status!=="cancelled"):null);
  if(!found)return"예약 정보를 찾지 못했습니다.";if(found.status==="noshow")return `${found.name}님은 노쇼 처리된 예약입니다. 다음날 예약 제한 대상입니다.`;if(found.status==="checkedin")return `${found.name}님은 이미 입장 처리되었습니다.`;if(st.penalties[found.emp]&&st.penalties[found.emp].blockDate===found.date)return `${found.name}님은 노쇼 제한 대상입니다. 관리자 확인이 필요합니다.`;found.status="checkedin";saveLocal();render();return `${found.name}님 입장 처리 완료: ${found.time}`;
}

function homeNoticeList(){const items=[...st.notices].sort((a,b)=>(b.createdAtMs||0)-(a.createdAtMs||0)).slice(0,3);if(!items.length)return `<div class="tiny">등록된 공지사항이 없습니다.</div>`;return items.map(n=>`<div class="notice-item"><div class="notice-tag">${esc(n.type||"공지")}</div><div style="font-weight:900;margin-bottom:4px">${esc(n.title)}</div><div class="notice-text">${esc(n.body)}</div></div>`).join("")}

function adminView(){return `<div class="card"><div class="row"><div><div class="title">관리자 모드</div><div class="sub">기능별 탭으로 구분하여 관리할 수 있습니다.</div></div><button class="btn light small" onclick="closeAdmin()">닫기</button></div><div class="line"></div><div class="admin-tabs"><button class="${st.adminTab==="camera"?"active":""}" onclick="setAdminTab('camera')">카메라</button><button class="${st.adminTab==="menu"?"active":""}" onclick="setAdminTab('menu')">메뉴업로드</button><button class="${st.adminTab==="reservations"?"active":""}" onclick="setAdminTab('reservations')">예약자목록</button><button class="${st.adminTab==="notice"?"active":""}" onclick="setAdminTab('notice')">공지사항</button></div>${adminPanel()}</div>`}
function adminPanel(){if(st.adminTab==="camera")return cameraPanel();if(st.adminTab==="menu")return menuPanel();if(st.adminTab==="reservations")return reservationPanel();return noticePanel()}
function cameraPanel(){return `<div><div class="title" style="font-size:16px">QR 체크인 카메라</div><div class="sub">카메라를 켜면 QR 코드를 인식하여 예약자를 자동으로 입장 처리합니다.</div><div class="btnrow"><button class="btn primary full" onclick="startScanner()">카메라 켜기</button></div><div id="scannerArea"></div></div>`}
function menuPanel(){return `<div><div class="row"><div><div class="title" style="font-size:16px">한 달 메뉴 업로드</div><div class="sub">CSV 양식으로 업로드하면 모든 화면에 반영됩니다.</div></div><button class="btn light small" onclick="downloadTemplate()">양식</button></div><div class="line"></div><input class="file" type="file" accept=".csv,text/csv" onchange="uploadMenu(event)"><div class="notice">권장 열 이름: date, main, menu, note</div></div>`}
function reservationPanel(){const rows=byDate(st.date).sort((a,b)=>a.time.localeCompare(b.time)),c=counts(st.date);return `<div><div class="row"><div><div class="title" style="font-size:16px">예약자 목록</div><div class="sub">선택한 날짜의 예약 현황입니다.</div></div><button class="btn light small" onclick="exportCsv()">CSV</button></div><div class="datebar"><button class="btn light small" onclick="shift(-1)">이전</button><div class="center">${pretty(st.date)}</div><button class="btn light small" onclick="shift(1)">다음</button></div><div class="mini-card" style="margin-bottom:12px">${SLOTS.map(s=>`<div class="detail"><span>${s[0]}</span><b>${c[s[0]]||0} / ${s[1]}</b></div>`).join("")}</div>${rows.length?rows.map(r=>`<div class="reservation-item"><div class="row" style="align-items:flex-start"><div><div style="font-weight:900">${esc(r.name)} · ${esc(r.dept)}</div><div class="sub">${esc(r.time)} · 행정번호 ${esc(r.emp)} · ${esc(r.code)}</div></div><span class="pill ${r.status==="checkedin"?"checkin":r.status==="noshow"?"cancel":"reserve"}">${r.status==="checkedin"?"입장완료":r.status==="noshow"?"노쇼":isLateReservationStatus(r.status)?"마감후예약":"예약"}</span></div><div class="btnrow"><button class="btn green full" onclick="checkin('${r.id}')">체크인</button><button class="btn danger full" onclick="cancelRes('${r.id}')">취소</button></div></div>`).join(""):`<div class="mini-card">예약자가 없습니다.</div>`}</div>`}
function noticePanel(){const list=[...st.notices].sort((a,b)=>(b.createdAtMs||0)-(a.createdAtMs||0));return `<div><div class="title" style="font-size:16px">공지사항 · 버전업 관리</div><div class="sub">메인 대시보드에 공지와 업데이트 내용을 노출합니다.</div><div class="line"></div><div class="mini-card" style="margin-bottom:12px"><div class="form"><select id="noticeType" class="select"><option>공지</option><option>업데이트</option><option>점검</option><option>안내</option></select><input id="noticeTitle" class="input" placeholder="제목"><textarea id="noticeBody" placeholder="공지 내용 또는 업데이트 내용을 입력해주세요."></textarea><button class="btn primary full" onclick="addNotice()">공지 등록</button></div></div>${list.length?list.map(n=>`<div class="reservation-item"><div class="row" style="align-items:flex-start"><div><span class="notice-tag">${esc(n.type)}</span><div style="font-weight:900;margin-bottom:4px">${esc(n.title)}</div><div class="sub">${esc(n.body)}</div></div><button class="btn danger small" onclick="removeNotice('${n.id}')">삭제</button></div></div>`).join(""):`<div class="mini-card">등록된 공지사항이 없습니다.</div>`}</div>`}


function toggleMenuCalendar(){st.menuCalendarOpen=!st.menuCalendarOpen;render();}
function setMenuPreviewDate(date){st.menuPreviewDate=date;st.menuCalendarOpen=false;render();}
function moveMenuMonth(delta){
  const base=new Date((st.menuPreviewDate||todayDate())+"T00:00:00");
  base.setMonth(base.getMonth()+delta);
  st.menuPreviewDate=fmt(base);
  render();
}
function calendarDropdown(selectedDate){
  const base=new Date(selectedDate+"T00:00:00");
  const y=base.getFullYear();
  const m=base.getMonth();
  const first=new Date(y,m,1);
  const start=new Date(first);
  start.setDate(first.getDate()-first.getDay());
  const weekdays=["일","월","화","수","목","금","토"];
  let cells=weekdays.map(w=>`<div class="calendar-weekday">${w}</div>`).join("");
  for(let i=0;i<42;i++){
    const d=new Date(start);
    d.setDate(start.getDate()+i);
    const ds=fmt(d);
    const cls=[d.getMonth()!==m?"muted":"",ds===selectedDate?"active":""].filter(Boolean).join(" ");
    cells+=`<button class="calendar-day ${cls}" onclick="setMenuPreviewDate('${ds}')">${d.getDate()}</button>`;
  }
  return `<div class="calendar-pop"><div class="calendar-head"><button class="btn light small" onclick="moveMenuMonth(-1)">이전달</button><strong>${y}년 ${m+1}월</strong><button class="btn light small" onclick="moveMenuMonth(1)">다음달</button></div><div class="calendar-grid">${cells}</div></div>`;
}

function openMenuDetail(){const m=menu(st.date);openModal(pretty(st.date)+" 점심 메뉴",`<div class="mini-card"><div style="font-weight:900;font-size:17px">${cleanMain(m.main)?esc(m.main):"오늘의 점심 메뉴"}</div><ul class="menu-list" style="margin-top:10px">${String(m.menu||"").split(/,|\n/).filter(Boolean).map(v=>`<li>${esc(v.trim())}</li>`).join("")}</ul>${m.note?`<div class="notice">${esc(m.note)}</div>`:""}</div>`)}
function openModal(title,html){document.getElementById("modalTitle").textContent=title;document.getElementById("modalBody").innerHTML=html;document.getElementById("modal").classList.add("show")}
function closeModal(){document.getElementById("modal").classList.remove("show")}
function rules(){openModal("이용수칙",`<ul class="menu-list"><li>입장 예정시각 전후 10분 내 입장을 권장합니다.</li><li>예약 후 미입장 시 노쇼로 누적될 수 있습니다.</li><li>식당 혼잡 완화를 위해 예약 시간 분산에 협조해주시기 바랍니다.</li></ul>`)}
function allergy(){openModal("알레르기 정보",`<ul class="menu-list"><li>난류, 우유, 메밀, 땅콩, 대두, 밀, 고등어, 게, 새우</li><li>돼지고기, 복숭아, 토마토, 아황산류, 호두, 닭고기</li><li>쇠고기, 오징어, 조개류, 잣</li></ul>`)}
function editUser(){if(!st.user)return updateLoginState();openModal("정보수정",`<div class="form"><input id="editName" class="input" value="${esc(st.user.name)}"><input id="editDept" class="input" value="${esc(st.user.dept)}"><input id="editEmp" class="input" value="${esc(st.user.emp)}" maxlength="4"><button class="btn primary full" onclick="applyEditUser()">저장</button></div>`)}
function applyEditUser(){const name=document.getElementById("editName").value.trim(),dept=document.getElementById("editDept").value.trim(),emp=document.getElementById("editEmp").value.trim();if(!name||!dept||!/^[0-9]{4}$/.test(emp))return toast("입력값을 다시 확인해주세요.");st.user={name,dept,emp};saveLocal();closeModal();render();toast("정보가 수정되었습니다.")}
function logout(){st.user=null;localStorage.removeItem("sg_real_user");updateLoginState();render();toast("로그아웃되었습니다.")}
function toggleHistory(){st.showHistory=!st.showHistory;render()}
function unlockAdmin(){const pw=prompt("관리자 코드를 입력해주세요. (데모: 1234)");if(pw===null)return;if(pw==="1234"){st.adminUnlocked=true;st.adminTab="camera";render();toast("관리자 모드가 열렸습니다.")}else toast("관리자 코드가 올바르지 않습니다.")}
function closeAdmin(){st.adminUnlocked=false;stopScanner();render()}
function setAdminTab(tab){st.adminTab=tab;if(tab!=="camera")stopScanner();render()}
async function addNotice(){const type=document.getElementById("noticeType").value,title=document.getElementById("noticeTitle").value.trim(),body=document.getElementById("noticeBody").value.trim();if(!title||!body)return toast("제목과 내용을 입력해주세요.");const item={type,title,body,createdAtMs:Date.now()};if(firebaseOn){try{await db.collection("notices").add(item);toast("공지사항이 등록되었습니다.")}catch(e){console.error(e);toast("공지 등록 중 오류가 발생했습니다.")}}else{item.id="local_"+Date.now();st.notices.unshift(item);saveLocal();render();toast("공지사항이 등록되었습니다.")}}
async function removeNotice(idv){if(firebaseOn){try{await db.collection("notices").doc(idv).delete();toast("공지사항이 삭제되었습니다.")}catch(e){console.error(e);toast("삭제 중 오류가 발생했습니다.")}}else{st.notices=st.notices.filter(n=>n.id!==idv);saveLocal();render();toast("공지사항이 삭제되었습니다.")}}
function csv(rows){return "\uFEFF"+rows.map(r=>r.map(v=>`"${String(v??"").replaceAll('"','""')}"`).join(",")).join("\n")}
function download(name,text){const blob=new Blob([text],{type:"text/csv;charset=utf-8;"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=name;a.click();URL.revokeObjectURL(url)}
function exportCsv(){const rows=[["날짜","입장시각","이름","부서","행정번호","상태","메인","메뉴","예약번호"]];st.reservations.filter(r=>r.date===st.date).forEach(r=>rows.push([r.date,r.time,r.name,r.dept,r.emp,r.status,r.main,r.menu,r.code]));download("서구밥상_"+st.date+".csv",csv(rows));toast("CSV를 다운로드했습니다.")}
function downloadTemplate(){const y=new Date().getFullYear(),m=String(new Date().getMonth()+1).padStart(2,"0"),rows=[["date","main","menu","note"]];for(let d=1;d<=31;d++)rows.push([`${y}-${m}-${String(d).padStart(2,"0")}`,"","잡곡밥, 된장국, 제육볶음, 시금치무침, 김치",""]);download("서구밥상_메뉴업로드_양식.csv",csv(rows));toast("메뉴 양식을 내려받았습니다.")}
function parseCSV(text){text=text.replace(/^\uFEFF/,"");let rows=[],row=[],cell="",quote=false;for(let i=0;i<text.length;i++){const ch=text[i],nx=text[i+1];if(ch==='"'){if(quote&&nx==='"'){cell+='"';i++}else quote=!quote}else if(ch===','&&!quote){row.push(cell.trim());cell=""}else if((ch==='\n'||ch==='\r')&&!quote){if(ch==='\r'&&nx==='\n')i++;row.push(cell.trim());if(row.some(v=>v))rows.push(row);row=[];cell=""}else cell+=ch}row.push(cell.trim());if(row.some(v=>v))rows.push(row);return rows}
function normDate(v){const m=String(v||"").trim().match(/^(\d{4})[-./](\d{1,2})[-./](\d{1,2})$/);return m?`${m[1]}-${String(m[2]).padStart(2,"0")}-${String(m[3]).padStart(2,"0")}`:""}
async function uploadMenu(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=async()=>{try{const rows=parseCSV(String(reader.result||"")),header=rows[0].map(v=>String(v).toLowerCase()),di=header.indexOf("date"),mi=header.indexOf("main"),ui=header.indexOf("menu"),ni=header.indexOf("note");if(di<0||ui<0)throw new Error("bad");let count=0;if(firebaseOn){const batch=db.batch();for(let i=1;i<rows.length;i++){const d=normDate(rows[i][di]),menuText=(rows[i][ui]||"").trim();if(!d||!menuText)continue;const item={date:d,main:(mi>=0?rows[i][mi]:"")||"",menu:menuText,note:(ni>=0?rows[i][ni]:"")||""};batch.set(db.collection("menus").doc(d),item,{merge:true});count++}await batch.commit()}else{for(let i=1;i<rows.length;i++){const d=normDate(rows[i][di]),menuText=(rows[i][ui]||"").trim();if(!d||!menuText)continue;st.menus[d]={date:d,main:(mi>=0?rows[i][mi]:"")||"",menu:menuText,note:(ni>=0?rows[i][ni]:"")||""};count++}saveLocal();render()}toast(`${count}일치 메뉴가 반영되었습니다.`)}catch(err){console.error(err);toast("메뉴 파일 형식을 확인해주세요.")}e.target.value=""};reader.readAsText(file,"utf-8")}

async function startScanner(){if(typeof jsQR==="undefined")return toast("QR 스캐너 라이브러리를 불러오지 못했습니다.");const area=document.getElementById("scannerArea");if(!area)return;area.innerHTML=`<div class="cameraBox"><video id="qrVideo" playsinline muted></video></div><div id="scanResult" class="scanResult">카메라 권한을 허용해주세요. QR이 인식되면 자동으로 입장 처리됩니다.</div><div class="btnrow"><button class="btn light full" onclick="stopScanner()">카메라 끄기</button></div><canvas id="qrCanvas" style="display:none"></canvas>`;try{st.scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false});const video=document.getElementById("qrVideo");video.srcObject=st.scanStream;await video.play();scanLoop()}catch(err){console.error(err);document.getElementById("scanResult").textContent="카메라를 실행할 수 없습니다. 브라우저 권한과 HTTPS 환경을 확인해주세요."}}
async function scanLoop(){const video=document.getElementById("qrVideo"),canvas=document.getElementById("qrCanvas"),result=document.getElementById("scanResult");if(!video||!canvas||!st.scanStream)return;const ctx=canvas.getContext("2d");if(video.readyState===video.HAVE_ENOUGH_DATA){canvas.width=video.videoWidth;canvas.height=video.videoHeight;ctx.drawImage(video,0,0,canvas.width,canvas.height);const img=ctx.getImageData(0,0,canvas.width,canvas.height);const found=jsQR(img.data,canvas.width,canvas.height);if(found&&found.data){const msg=await checkinByCode(found.data);if(result)result.textContent=msg;stopScanner(false);toast(msg);return}}st.scanTimer=requestAnimationFrame(scanLoop)}
function stopScanner(clear=true){if(st.scanTimer){cancelAnimationFrame(st.scanTimer);st.scanTimer=null}if(st.scanStream){st.scanStream.getTracks().forEach(t=>t.stop());st.scanStream=null}if(clear){const area=document.getElementById("scannerArea");if(area)area.innerHTML=""}}
function resetLocal(){if(!confirm("로컬 데모 데이터를 초기화할까요?"))return;localStorage.removeItem("sg_real_reservations");localStorage.removeItem("sg_real_menus");localStorage.removeItem("sg_real_notices");localStorage.removeItem("sg_real_penalties");localStorage.removeItem("sg_real_seeded");st.reservations=[];st.menus={};st.notices=[];st.penalties={};seedLocalIfNeeded();render();toast("로컬 데이터가 초기화되었습니다.")}
function seedLocalIfNeeded(){if(localStorage.getItem("sg_real_seeded"))return;const today=fmt(new Date());st.notices=[{id:"n1",type:"공지",title:"시범 운영 안내",body:"서구밥상 시범 운영 중입니다. 예약 시간 분산에 협조해주시기 바랍니다.",createdAtMs:Date.now()},{id:"n2",type:"업데이트",title:"QR 체크인 준비",body:"관리자 화면에서 QR 카메라 인식 기능을 점검할 수 있습니다.",createdAtMs:Date.now()-1000}];saveLocal();localStorage.setItem("sg_real_seeded","1")}
</script>
